name: Deploy Web Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.1-stable
          use-dotnet: false
          include-templates: true

      - name: Headless Smoke Check
        run: |
          godot --headless --path . --script res://tools/ci_smoke_check.gd

      - name: Validate Web Export
        run: |
          mkdir -p build/web-smoke
          godot --headless --path . --export-release "Web" build/web-smoke/index.html

  export-web:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.1-stable
          use-dotnet: false
          include-templates: true

      - name: Export Web Build
        run: |
          mkdir -p build/web
          godot --headless --export-release "Web" build/web/index.html
          touch build/web/.nojekyll

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy-pages:
    runs-on: ubuntu-latest
    needs: export-web
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
